<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Sharp square background (no border radius) -->
  <rect width="512" height="512" fill="#0D1117"/>
  
  <!-- Left accent stripe in Oracle red -->
  <rect x="0" y="0" width="6" height="512" fill="#C74634"/>
  
  <!-- EPM Cube — visual anchor -->
  <g transform="translate(256, 155) scale(0.82)">
    <polygon points="0,-80 80,-40 0,0 -80,-40" fill="#C74634" opacity="0.95"/>
    <polygon points="-80,-40 0,0 0,95 -80,55" fill="#8B1E15" opacity="0.95"/>
    <polygon points="80,-40 0,0 0,95 80,55" fill="#A32E22" opacity="0.95"/>
    <line x1="-40" y1="-60" x2="40" y2="-20" stroke="#fff" stroke-width="1.5" opacity="0.25"/>
    <line x1="-40" y1="-20" x2="40" y2="-60" stroke="#fff" stroke-width="1.5" opacity="0.25"/>
    <line x1="0" y1="-80" x2="0" y2="0" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- FMEPM with EPM in red, DM Serif Display -->
  <text x="256" y="365" font-family="DM Serif Display" font-size="76" font-weight="400" text-anchor="middle" letter-spacing="2">
    <tspan fill="#ffffff">FM</tspan><tspan fill="#C74634">EPM</tspan>
  </text>
  
  <!-- Red divider -->
  <line x1="180" y1="390" x2="332" y2="390" stroke="#C74634" stroke-width="2" opacity="0.7"/>
  
  <!-- Product subtitle in DM Sans 9pt (correct font family name for the installed font) -->
  <text x="256" y="432" font-family="DM Sans 9pt" font-size="22" font-weight="500" fill="#A9B1BB" text-anchor="middle" letter-spacing="3">ORACLE EPM MCP</text>
</svg>
