<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background with subtle rounded corners matching FMEPM brand -->
  <rect width="512" height="512" rx="88" ry="88" fill="#0D1117"/>
  
  <!-- Accent border stripe (subtle) -->
  <rect x="0" y="0" width="6" height="512" fill="#C74634"/>
  
  <!-- EPM Cube icon - stylized 3D planning cube -->
  <g transform="translate(256, 230)">
    <!-- Top face -->
    <polygon points="0,-80 80,-40 0,0 -80,-40" fill="#C74634" opacity="0.95"/>
    <!-- Left face -->
    <polygon points="-80,-40 0,0 0,95 -80,55" fill="#8B1E15" opacity="0.95"/>
    <!-- Right face -->
    <polygon points="80,-40 0,0 0,95 80,55" fill="#A32E22" opacity="0.95"/>
    
    <!-- Grid lines on top face -->
    <line x1="-40" y1="-60" x2="40" y2="-20" stroke="#fff" stroke-width="1.5" opacity="0.25"/>
    <line x1="-40" y1="-20" x2="40" y2="-60" stroke="#fff" stroke-width="1.5" opacity="0.25"/>
    <line x1="0" y1="-80" x2="0" y2="0" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Label text "EPM" -->
  <text x="256" y="400" font-family="Georgia, 'DM Serif Display', serif" font-size="72" font-weight="400" fill="#ffffff" text-anchor="middle" letter-spacing="4">EPM</text>
  
  <!-- Subtitle "MCP" in smaller, muted -->
  <text x="256" y="448" font-family="'DM Sans', sans-serif" font-size="22" font-weight="500" fill="#A9B1BB" text-anchor="middle" letter-spacing="6">MCP SERVER</text>
</svg>
